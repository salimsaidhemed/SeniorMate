services:
  postgres:
    image: postgres:16-alpine
    container_name: seniormate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seniormate}
      POSTGRES_USER: ${POSTGRES_USER:-seniormate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seniormate} -d ${POSTGRES_DB:-seniormate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: seniormate-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-local-access-key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-local-only}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: seniormate-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-local-only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://seniormate:change-me-local-only@postgres:5432/seniormate}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-local-access-key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-local-only}
      MINIO_BUCKET: ${MINIO_BUCKET:-seniormate-medical-records}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MEDICAL_RECORD_MAX_FILE_SIZE: ${MEDICAL_RECORD_MAX_FILE_SIZE:-10485760}
      PATIENT_PHOTO_MAX_FILE_SIZE: ${PATIENT_PHOTO_MAX_FILE_SIZE:-5242880}
      BRANDING_LOGO_MAX_FILE_SIZE: ${BRANDING_LOGO_MAX_FILE_SIZE:-2097152}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/seniormate}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/realms/seniormate/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-seniormate-api}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-seniormate}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-seniormate-admin-api}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-change-me-local-only}
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: seniormate-frontend
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5001/api}
      VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-true}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-seniormate}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-seniormate-frontend}
      VITE_KEYCLOAK_API_CLIENT_ID: ${VITE_KEYCLOAK_API_CLIENT_ID:-seniormate-api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: seniormate-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-local-only}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/seniormate-realm.json:/opt/keycloak/data/import/seniormate-realm.json:ro
      - keycloak_data:/opt/keycloak/data

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
  keycloak_data:
